<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body{
    background: #000;
    color: white;
}

/* Spinner Container */
.emptyState {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 48px 0;
}

.emptyState h3 {
    margin: 0;
    color: #f5f5;
    font-size: 14px;
    font-weight: 500;
}

/* Spinner SVG */
.spinner-nav {
    width: 40px;
    height: 40px;
    animation: rotate 2s linear infinite;
}

.spinner-nav .path {
    stroke: hotpink;
    stroke-linecap: round;
    animation: dash 1.5s ease-in-out infinite;
    fill: none;
    stroke-width: 3;
}

/* Animations */
@keyframes rotate {
    100% {
        transform: rotate(360deg);
    }
}

@keyframes dash {
    0% {
        stroke-dasharray: 1, 150;
        stroke-dashoffset: 0;
    }
    50% {
        stroke-dasharray: 90, 150;
        stroke-dashoffset: -35;
    }
    100% {
        stroke-dasharray: 90, 150;
        stroke-dashoffset: -124;
    }
}
</style>
<body>
    <div class="emptyState">
    <svg class="spinner-nav" viewBox="25 25 50 50">
        <circle class="path" cx="50" cy="50" r="20"></circle>
    </svg>
    <h3>Loading enrollments...</h3>
</div>
</body>
</html>
